<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>custom-se</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="title">custom-se</div>
        <div class="subtitle">Search (Phase 1)</div>
      </header>

      <section class="card">
        <form id="searchForm" class="form">
          <label class="label" for="q">Query</label>
          <div class="row">
            <input id="q" name="q" class="input" placeholder="type query…" autocomplete="off" />
            <button class="button" type="submit">Search</button>
          </div>

          <div class="controls">
            <label class="checkbox">
              <input id="partial" name="partial" type="checkbox" />
              Partial
            </label>
            <label class="label-inline">
              Limit
              <input id="limit" name="limit" class="input small" type="number" min="0" value="10" />
            </label>
          </div>
        </form>
      </section>

      <section class="card">
        <div id="status" class="status muted">Ready.</div>
        <pre id="results" class="results"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
